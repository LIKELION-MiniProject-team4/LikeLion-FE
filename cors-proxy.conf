# 백엔드(backend:8080) 앞에 서서, 응답에 CORS 허용 헤더를 붙여주는 중계 서버.
# 이렇게 하면 Live Server(localhost:5500) 같은 다른 출처에서도 백엔드를 호출할 수 있다.
# 백엔드 코드는 전혀 건드리지 않는다.
server {
    listen 80;
    server_name _;

    location / {
        # 백엔드가 스스로 붙이는 CORS 헤더는 숨긴다(중복 방지).
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        # 프리플라이트(OPTIONS) 요청은 여기서 바로 응답한다.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            add_header Access-Control-Max-Age 3600 always;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }

        # 실제 요청은 백엔드로 그대로 전달한다.
        # ★ Origin 헤더를 지워서 백엔드(Spring Security)가 CORS 검사를 안 하게 한다.
        #   (백엔드는 이걸 '같은 출처 요청'으로 보고 403 없이 처리한다)
        proxy_set_header Origin "";
        proxy_pass http://backend:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 백엔드 응답(성공/에러 모두)에 CORS 허용 헤더를 붙인다.
        add_header Access-Control-Allow-Origin  $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
    }
}
