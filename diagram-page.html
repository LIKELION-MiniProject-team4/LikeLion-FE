<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>교수 평가 다이어그램</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    background: #F3F4F6;
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    display: flex;
    justify-content: center;
  }
  .page {
    width: 100%;
    max-width: 760px;
    background: #FFFFFF;
    min-height: 100vh;
  }

  /* 상단 바 */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
  }
  .topbar .icon-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 999px;
    background: #F3F4F6;
    color: #374151;
    cursor: pointer;
  }
  .topbar .icon-btn svg { width: 20px; height: 20px; }
  .topbar .title {
    font-size: 17px;
    font-weight: 700;
    color: #111827;
  }

  .content { padding: 0 24px 40px; }

  /* 교수 선택 드롭다운 */
  .dropdown {
    border: 1px solid #E5E7EB;
    border-radius: 999px;
    padding: 14px 20px;
    font-size: 16px;
    font-weight: 700;
    color: #111827;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    margin-bottom: 20px;
  }
  .dropdown svg.chev { width: 18px; height: 18px; color: #9CA3AF; }

  /* 다이어그램 카드 */
  .chart-card {
    background: #FFFFFF;
    border: 1px solid #F0F1F3;
    border-radius: 24px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    padding: 24px 12px 12px;
    margin-bottom: 20px;
  }
  .axis-label { font-size: 15px; font-weight: 700; fill: #111827; }
  .tick-label { font-size: 12px; fill: #9CA3AF; }

  .legend {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding-bottom: 12px;
    font-size: 14px;
    font-weight: 600;
    color: #374151;
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; background: #3B82F6; }

  /* 지표 설명 카드 */
  .desc-card {
    background: #F9FAFB;
    border-radius: 20px;
    padding: 20px 22px;
  }
  .desc-card h3 {
    margin: 0 0 14px;
    font-size: 15px;
    font-weight: 700;
    color: #111827;
  }
  .desc-item {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    font-size: 13.5px;
    line-height: 1.5;
    color: #4B5563;
  }
  .desc-item b { color: #111827; white-space: nowrap; }

  .footnote {
    margin-top: 16px;
    font-size: 12px;
    color: #9CA3AF;
    text-align: center;
  }
</style>
</head>
<body>

<div class="page">

  <div class="topbar">
    <div class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div class="title">교수 평가 다이어그램</div>
    <div class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <path d="M8.6 10.6l6.8-3.9M8.6 13.4l6.8 3.9"/>
      </svg>
    </div>
  </div>

  <div class="content">

    <div class="dropdown">
      <span id="profName">김을지 교수님</span>
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 9l4-4 4 4M8 15l4 4 4-4"/>
      </svg>
    </div>

    <div class="chart-card">
      <svg id="radar" viewBox="0 0 800 780" width="100%" height="auto"></svg>
      <div class="legend">
        <span class="legend-dot"></span>
        <span id="legendName">김을지 교수님 평균</span>
      </div>
    </div>

    <div class="desc-card">
      <h3>지표 설명</h3>
      <div class="desc-item"><b>난이도</b><span>시험 난이도에 대한 평균 평가</span></div>
      <div class="desc-item"><b>과제량</b><span>과제의 양과 난이도에 대한 평균 평가</span></div>
      <div class="desc-item"><b>시험 범위 명확성</b><span>시험 범위가 명확하게 안내되는지 여부</span></div>
      <div class="desc-item"><b>피드백 속도</b><span>질문/과제에 대한 피드백 속도</span></div>
      <div class="desc-item"><b>수업 태도</b><span>수업 준비, 태도, 열정 등에 대한 평가</span></div>
    </div>

    <div class="footnote">* 해당 데이터는 사용자 태그 리뷰를 기준으로 산출됩니다.</div>

  </div>
</div>

<script>
  const cx = 400, cy = 400, maxR = 280, levels = 5;
  const axes = ["난이도", "과제량", "시험 범위 명확성", "피드백 속도", "수업 태도"];
  const values = [3, 4, 4.8, 4.3, 5]; // 5점 만점 (예시 데이터)

  const svgNS = "http://www.w3.org/2000/svg";
  const svg = document.getElementById("radar");

  function pointFor(axisIndex, r) {
    const angle = -Math.PI / 2 + axisIndex * (2 * Math.PI / axes.length);
    return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
  }
  function pointsToStr(pts) {
    return pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  }

  for (let lvl = 1; lvl <= levels; lvl++) {
    const r = (maxR / levels) * lvl;
    const pts = axes.map((_, i) => pointFor(i, r));
    const poly = document.createElementNS(svgNS, "polygon");
    poly.setAttribute("points", pointsToStr(pts));
    poly.setAttribute("fill", "none");
    poly.setAttribute("stroke", "#EEF0F3");
    poly.setAttribute("stroke-width", "1");
    svg.appendChild(poly);

    const tick = document.createElementNS(svgNS, "text");
    tick.setAttribute("x", cx + 8);
    tick.setAttribute("y", cy - r + 4);
    tick.setAttribute("class", "tick-label");
    tick.textContent = lvl;
    svg.appendChild(tick);
  }

  axes.forEach((_, i) => {
    const p = pointFor(i, maxR);
    const line = document.createElementNS(svgNS, "line");
    line.setAttribute("x1", cx); line.setAttribute("y1", cy);
    line.setAttribute("x2", p.x); line.setAttribute("y2", p.y);
    line.setAttribute("stroke", "#EEF0F3");
    line.setAttribute("stroke-width", "1");
    svg.appendChild(line);
  });

  const dataPts = axes.map((_, i) => pointFor(i, (maxR / levels) * values[i]));
  const dataPoly = document.createElementNS(svgNS, "polygon");
  dataPoly.setAttribute("points", pointsToStr(dataPts));
  dataPoly.setAttribute("fill", "rgba(59,130,246,0.18)");
  dataPoly.setAttribute("stroke", "#3B82F6");
  dataPoly.setAttribute("stroke-width", "3");
  dataPoly.setAttribute("stroke-linejoin", "round");
  svg.appendChild(dataPoly);

  dataPts.forEach(p => {
    const dot = document.createElementNS(svgNS, "circle");
    dot.setAttribute("cx", p.x); dot.setAttribute("cy", p.y);
    dot.setAttribute("r", 7);
    dot.setAttribute("fill", "#3B82F6");
    dot.setAttribute("stroke", "#FFFFFF");
    dot.setAttribute("stroke-width", "2");
    svg.appendChild(dot);
  });

  axes.forEach((label, i) => {
    const p = pointFor(i, maxR + 46);
    const text = document.createElementNS(svgNS, "text");
    text.setAttribute("x", p.x); text.setAttribute("y", p.y);
    text.setAttribute("class", "axis-label");
    text.setAttribute("text-anchor", Math.abs(p.x - cx) < 20 ? "middle" : (p.x > cx ? "start" : "end"));
    text.setAttribute("dominant-baseline", "middle");
    text.textContent = label;
    svg.appendChild(text);
  });
</script>

</body>
</html>
